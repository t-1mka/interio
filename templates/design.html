<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/a11y-3d.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="bg-image"></div><div class="bg-overlay"></div>
    <header class="header">
        <div class="header-container">
            <div class="logo"><a href="/">Interio</a></div>
            <nav class="nav-links"><a href="/" class="nav-link">Главная</a><a href="/quiz" class="nav-link">Квиз</a><a href="/portfolio" class="nav-link">Портфолио</a></nav>
            <div class="header-actions"><button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button></div>
        </div>
    </header>

    <section style="padding-top:100px;">
        <div class="container" style="max-width:1000px;">
            <!-- 3D Room -->
            <div id="room3dContainer" style="width:100%;height:450px;border-radius:16px;overflow:hidden;border:1px solid var(--border-color);margin-bottom:24px;"></div>

            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
                <button onclick="takeScreenshot()" class="btn-outline" style="padding:10px 20px;"><i class="fas fa-camera"></i> Скриншот</button>
                <button onclick="downloadParams()" class="btn-outline" style="padding:10px 20px;"><i class="fas fa-download"></i> JSON</button>
                <button onclick="likeDesign()" class="btn-outline" style="padding:10px 20px;" id="likeBtn"><i class="fas fa-heart"></i> <span id="likeCount">0</span></button>
                <a href="/quiz" class="btn-outline" style="padding:10px 20px;text-decoration:none;" id="useAsBaseBtn" style="display:none;"><i class="fas fa-magic"></i> Взять за основу</a>
            </div>

            <!-- Info -->
            <div id="designInfo" style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:24px;margin-bottom:32px;"></div>

            <!-- Comments -->
            <div style="margin-bottom:32px;">
                <h3 style="color:var(--text-main);margin-bottom:16px;">Комментарии</h3>
                <div style="display:flex;gap:8px;margin-bottom:16px;">
                    <input id="commentName" type="text" placeholder="Имя" style="flex:1;padding:10px 16px;border-radius:12px;background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-main);">
                    <input id="commentText" type="text" placeholder="Написать комментарий..." style="flex:3;padding:10px 16px;border-radius:12px;background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-main);">
                    <button onclick="addComment()" style="padding:10px 20px;border-radius:12px;background:var(--accent);color:white;border:none;cursor:pointer;">→</button>
                </div>
                <div id="commentsList"></div>
            </div>
        </div>
    </section>

    <script src="/static/3d-room.js"></script>
    <script src="/static/actions.js"></script>
    <script>
    const designId = window.location.pathname.split('/').pop();
    let sceneParams = {};

    // Theme
    const tt=document.getElementById('themeToggle'), html=document.documentElement;
    html.setAttribute('data-theme',localStorage.getItem('interio_theme')||'dark');
    tt.querySelector('i').className=html.getAttribute('data-theme")==='dark'?'fas fa-moon':'fas fa-sun';
    tt.onclick=()=>{const n=html.getAttribute('data-theme")==='dark'?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('interio_theme',n);tt.querySelector('i').className=n==='dark'?'fas fa-moon':'fas fa-sun';};

    async function loadDesign(){
        try{
            const r=await fetch(`/api/portfolio/${designId}`);const d=await r.json();
            if(d.error){document.body.innerHTML='<h1 style="text-align:center;padding:100px;color:var(--text-main);">Дизайн не найден</h1>';return;}
            document.title = d.title + ' — Interio';
            sceneParams = d.scene_params ? JSON.parse(d.scene_params) : {};
            document.getElementById('likeCount').textContent = d.likes_count || 0;

            // Info
            document.getElementById('designInfo').innerHTML = `
                <h2 style="color:var(--text-main);margin-bottom:12px;">${d.title}</h2>
                ${d.description?`<p style="color:var(--text-secondary);margin-bottom:16px;">${d.description}</p>`:''}
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
                    <div><small style="color:var(--text-muted);">Автор</small><p style="color:var(--text-main);">${d.author_name||'Аноним'}</p></div>
                    <div><small style="color:var(--text-muted);">Стиль</small><p style="color:var(--text-main);">${d.style||'—'}</p></div>
                    <div><small style="color:var(--text-muted);">Бюджет</small><p style="color:var(--text-main);">${d.budget||'—'}</p></div>
                    <div><small style="color:var(--text-muted);">Лайки</small><p style="color:var(--text-main);">${d.likes_count||0}</p></div>
                    <div><small style="color:var(--text-muted);">Просмотры</small><p style="color:var(--text-main);">${d.views_count||0}</p></div>
                </div>`;

            // Show "use as base" if we have params
            if(sceneParams.style) document.getElementById('useAsBaseBtn').style.display = '';

            // Init 3D
            setTimeout(()=>{
                const c=document.getElementById('room3dContainer');
                if(c&&typeof Room3D!=='undefined'){
                    Room3D.init(c);
                    Room3D.update({room_type:sceneParams.room_type,zones:sceneParams.zones||[],area:parseInt(sceneParams.area)||60,style:sceneParams.style,budget:sceneParams.budget,colors:sceneParams.colors||[]});
                }
            },500);
        }catch(e){console.error(e);}
    }

    async function likeDesign(){
        try{const r=await fetch(`/api/portfolio/${designId}/like`,{method:'POST'});const d=await r.json();document.getElementById('likeCount').textContent=d.likes_count;}catch(e){}
    }

    async function addComment(){
        const name=document.getElementById('commentName').value||'Аноним';
        const text=document.getElementById('commentText').value;
        if(!text) return;
        try{
            await fetch(`/api/portfolio/${designId}/comment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({design_id:parseInt(designId),text,author_name:name})});
            document.getElementById('commentText').value='';loadComments();
        }catch(e){}
    }

    async function loadComments(){
        try{
            const r=await fetch(`/api/portfolio/${designId}/comments`);const d=await r.json();
            const cl=document.getElementById('commentsList');
            cl.innerHTML=d.comments.map(c=>`<div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:16px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;"><strong style="color:var(--text-main);">${c.author_name}</strong><small style="color:var(--text-muted);">${c.created_at||''}</small></div><p style="color:var(--text-secondary);margin-top:4px;">${c.text}</p></div>`).join('')||'<p style="color:var(--text-muted);">Нет комментариев</p>';
        }catch(e){}
    }

    function takeScreenshot(){
        if(typeof Room3D==='undefined') return;
        const a=document.createElement('a');a.href=Room3D.screenshot();a.download='interio_design.png';a.click();
    }

    function downloadParams(){
        const blob=new Blob([JSON.stringify(sceneParams,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='interio_params.json';a.click();
    }

    loadDesign(); loadComments();
    </script>
</body>
</html>
