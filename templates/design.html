<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    .design-page { padding-top: 100px; min-height: 100vh; }
    .design-container { max-width: 700px; margin: 0 auto; padding: 0 24px; }
    .design-header { margin-bottom: 24px; }
    .design-header h1 { font-family: var(--font-display); font-size: 2rem; color: var(--text-main); }
    .design-header p { color: var(--text-muted); }
    .design-details { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-muted); }
    .detail-value { color: var(--text-main); font-weight: 600; }
    .design-actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .design-actions button { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .design-actions button:hover { border-color: var(--accent); }
    .comments-section { margin-top: 24px; }
    .comments-section h3 { margin-bottom: 16px; color: var(--text-main); }
    .comment-form { display: flex; gap: 8px; margin-bottom: 16px; }
    .comment-form input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-main); outline: none; }
    .comment-form button { padding: 10px 20px; border-radius: 10px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 600; }
    .comment { background: var(--bg-primary); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .comment-author { font-size: 0.8rem; color: var(--accent); font-weight: 600; }
    .comment-text { font-size: 0.9rem; color: var(--text-main); margin-top: 4px; }
    </style>
</head>
<body class="design-page">
    <header class="header header-minimal"><div class="header-container"><a href="/portfolio" class="logo"><span>Портфолио</span></a><div class="header-actions"><a href="/" class="btn-outline btn-small"><i class="fas fa-home"></i> На главную</a></div></div></header>
    <div class="design-container">
        <div class="design-header"><h1 id="designTitle">Загрузка...</h1><p id="designDesc"></p></div>
        <div class="design-actions">
            <button id="likeBtn"><i class="fas fa-heart" id="likeIcon"></i> <span id="likeCount">0</span></button>
            <button onclick="window.location.href='/portfolio'"><i class="fas fa-arrow-left"></i> Назад</button>
        </div>
        <div class="design-details" id="designDetails"></div>
        <div class="comments-section"><h3>Комментарии</h3><div class="comment-form"><input id="commentInput" placeholder="Ваш комментарий..."><button id="commentBtn">Отправить</button></div><div id="commentsList"></div></div>
    </div>
    <script>
    var designId = window.location.pathname.split('/').pop();
    async function loadDesign() {
        try {
            var r = await fetch('/api/portfolio/'+designId);
            var d = await r.json();
            document.getElementById('designTitle').textContent = d.title;
            document.getElementById('designDesc').textContent = d.description || '';
            document.getElementById('likeCount').textContent = d.likes_count || 0;
            var sc = JSON.parse(d.scene_params||'{}');
            document.getElementById('designDetails').innerHTML = '<div class="detail-row"><span class="detail-label">Стиль</span><span class="detail-value">'+(d.style||'—')+'</span></div><div class="detail-row"><span class="detail-label">Помещение</span><span class="detail-value">'+(d.room||'—')+'</span></div><div class="detail-row"><span class="detail-label">Бюджет</span><span class="detail-value">'+(d.budget||'—')+'</span></div><div class="detail-row"><span class="detail-label">Площадь</span><span class="detail-value">'+(sc.area||'—')+' м²</span></div><div class="detail-row"><span class="detail-label">Зоны</span><span class="detail-value">'+((sc.zones||[]).join(', ')||'—')+'</span></div><div class="detail-row"><span class="detail-label">Просмотры</span><span class="detail-value">'+(d.views_count||0)+'</span></div>';
            loadComments();
        } catch(e) { document.getElementById('designTitle').textContent = 'Дизайн не найден'; }
    }
    document.getElementById('likeBtn').addEventListener('click', async function() {
        var r = await fetch('/api/portfolio/'+designId+'/like', {method:'POST'});
        var d = await r.json();
        document.getElementById('likeCount').textContent = d.likes_count;
    });
    async function loadComments() {
        var r = await fetch('/api/portfolio/'+designId+'/comments');
        var d = await r.json();
        document.getElementById('commentsList').innerHTML = (d.comments||[]).map(function(c){return '<div class="comment"><div class="comment-author">'+c.author_name+'</div><div class="comment-text">'+c.text+'</div></div>';}).join('')||'<p style="color:var(--text-muted)">Нет комментариев</p>';
    }
    document.getElementById('commentBtn').addEventListener('click', async function() {
        var text = document.getElementById('commentInput').value.trim();
        if(!text) return;
        await fetch('/api/portfolio/'+designId+'/comment', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({design_id:parseInt(designId),text:text,author_name:'Аноним'})});
        document.getElementById('commentInput').value=''; loadComments();
    });
    loadDesign();
    </script>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>

    <!-- GigaChat Button -->
    <button id="gcFloatBtn" title="ИИ-советник" onclick="document.getElementById('gcModal').style.display='flex'" style="position:fixed;bottom:28px;right:28px;z-index:1000;width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,#2563eb,#e74c5e);color:white;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.5);display:flex;align-items:center;justify-content:center;">❓</button>
    <!-- GigaChat Modal -->
    <div id="gcModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h3 style="margin:0;font-size:1.1rem;color:var(--text-main);">❓ ИИ-советник</h3>
                <button onclick="document.getElementById('gcModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;">&times;</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
            <div id="gcMsgs" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;">
                <div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;line-height:1.5;">Привет! Спросите про стиль, бюджет, планировку, размеры помещений или материалы. 🏠</div>
            </div>
            <div style="display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border-color);">
                <input id="gcInput" type="text" placeholder="Спросите о дизайне..." style="flex:1;padding:12px 16px;border-radius:12px;background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-main);font-size:.9rem;outline:none;">
                <button onclick="sendGC()" style="padding:12px 20px;border-radius:12px;background:var(--accent);color:white;border:none;cursor:pointer;font-weight:600;">→</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('gcFloatBtn').addEventListener('click',function(){document.getElementById('gcModal').style.display='flex';});
    document.getElementById('gcModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
    async function sendGC(){var i=document.getElementById('gcInput'),b=document.getElementById('gcSendBtn'),m=document.getElementById('gcMsgs'),q=i.value.trim();if(!q)return;m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 4px 16px;background:var(--accent);color:white;align-self:flex-end;max-width:85%;font-size:.9rem;">'+esc(q)+'</div>';i.value='';b.disabled=true;m.scrollTop=m.scrollHeight;try{var r=await fetch('/api/support',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})}),d=await r.json();m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">'+esc(d.answer||'Ошибка')+'</div>';}catch(e){m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">⚠️ Ошибка</div>';}b.disabled=false;m.scrollTop=m.scrollHeight;}
    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    </script>


    <script>
    // Voice input for all textareas and inputs
    (function(){
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        function addVoiceBtn(input) {
            if (input.dataset.voiceAdded) return;
            input.dataset.voiceAdded = 'true';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '&#127908;';
            btn.title = 'Голосовой ввод';
            btn.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.6;z-index:10;';
            btn.addEventListener('click', function() {
                var rec = new SR();
                rec.lang = 'ru-RU';
                rec.onresult = function(ev) { input.value = ev.results[0][0].transcript; };
                btn.style.opacity = '1';
                rec.start();
                setTimeout(function(){ btn.style.opacity = '0.6'; }, 3000);
            });
            var wrap = document.createElement('div');
            wrap.style.cssText = 'position:relative;display:inline-block;width:100%;';
            input.parentNode.insertBefore(wrap, input);
            wrap.appendChild(input);
            wrap.appendChild(btn);
        }
        document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        // Re-check on dynamic content
        var obs = new MutationObserver(function(){
            document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        });
        obs.observe(document.body, {childList:true, subtree:true});
    })();
    </script>

</body>
</html>
