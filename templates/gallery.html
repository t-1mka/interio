<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo"><a href="/">Interio</a></div>
            <nav class="nav-links">
                <a href="/" class="nav-link">Главная</a>
                <a href="/quiz" class="nav-link">Квиз</a>
                <a href="/gallery" class="nav-link active">Галерея</a>
            </nav>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="login-btn" onclick="window.authManager?.openModal()">Войти</button>
            </div>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section" style="padding-top: 100px; min-height: 100vh;">
        <div class="container">
            <!-- Filters -->
            <div class="gallery-filters" style="display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; align-items: center;">
                <select id="filterStyle" style="padding: 10px 16px; border-radius: 50px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); font-family: var(--font-body);">
                    <option value="">Все стили</option>
                    <option value="Современный">Современный</option>
                    <option value="Минимализм">Минимализм</option>
                    <option value="Скандинавский">Скандинавский</option>
                    <option value="Классический">Классический</option>
                    <option value="Лофт">Лофт</option>
                </select>
                <select id="filterRoom" style="padding: 10px 16px; border-radius: 50px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); font-family: var(--font-body);">
                    <option value="">Все комнаты</option>
                    <option value="Гостиная">Гостиная</option>
                    <option value="Спальня">Спальня</option>
                    <option value="Кухня">Кухня</option>
                </select>
                <select id="filterSort" style="padding: 10px 16px; border-radius: 50px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); font-family: var(--font-body);">
                    <option value="newest">Новые</option>
                    <option value="popular">Популярные</option>
                </select>
                <input id="searchInput" type="text" placeholder="🔍 Поиск..." style="padding: 10px 20px; border-radius: 50px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); font-family: var(--font-body); min-width: 200px;">
            </div>

            <!-- Masonry Grid -->
            <div id="galleryGrid" class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>

            <!-- Load More -->
            <div style="text-align: center; margin-top: 40px;">
                <button id="loadMoreBtn" class="btn-outline" style="padding: 12px 32px;">Загрузить ещё</button>
            </div>
        </div>
    </section>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-modal-content">
            <span class="auth-close" onclick="window.authManager?.closeModal()">&times;</span>
            <div id="phoneStep" class="auth-step">
                <h2>Вход в личный кабинет</h2>
                <p>Введите номер телефона</p>
                <input type="tel" id="phoneInput" placeholder="+7 (___) ___-__-__" oninput="window.authManager?.formatPhone(this)">
                <div id="phoneError" class="auth-error-message"></div>
                <button onclick="window.authManager?.checkPhone()">Далее</button>
            </div>
            <div id="passwordStep" class="auth-step" style="display:none;">
                <h2>Вход</h2>
                <p id="userPhone"></p>
                <input type="password" id="passwordInput" placeholder="Пароль">
                <div id="passwordError" class="auth-error-message"></div>
                <button onclick="window.authManager?.login()">Войти</button>
                <button class="secondary" onclick="window.authManager?.backToPhone()">Назад</button>
            </div>
            <div id="registerStep" class="auth-step" style="display:none;">
                <h2>Регистрация</h2>
                <p id="newUserPhone"></p>
                <input type="text" id="nicknameInput" placeholder="Никнейм">
                <input type="password" id="newPasswordInput" placeholder="Пароль (мин. 8 символов + буква)">
                <input type="password" id="confirmPasswordInput" placeholder="Повторите пароль">
                <div id="registerError" class="auth-error-message"></div>
                <button onclick="window.authManager?.register()">Зарегистрироваться</button>
                <button class="secondary" onclick="window.authManager?.backToPhone()">Назад</button>
            </div>
        </div>
    </div>

    <!-- Cabinet Modal -->
    <div id="cabinetModal" class="cabinet-modal">
        <div class="cabinet-modal-content">
            <span class="cabinet-close" onclick="window.authManager?.closeCabinetModal()">&times;</span>
            <div class="cabinet-container">
                <h2 id="cabinetNickname"></h2>
                <button class="logout-btn" onclick="window.authManager?.logout()">Выйти</button>
            </div>
        </div>
    </div>

    <script src="/static/state-manager.js"></script>
    <script src="/static/auth.js"></script>
    <script src="/static/actions.js"></script>
    <script>
    // Gallery App
    document.addEventListener('DOMContentLoaded', () => {
        let currentPage = 1;
        let loading = false;

        async function loadDesigns(reset = false) {
            if (loading) return;
            loading = true;
            if (reset) { currentPage = 1; document.getElementById('galleryGrid').innerHTML = ''; }

            const style = document.getElementById('filterStyle').value;
            const room = document.getElementById('filterRoom').value;
            const sort = document.getElementById('filterSort').value;

            try {
                const params = new URLSearchParams({ style, room, sort, page: currentPage, limit: 12 });
                const res = await fetch(`/api/gallery?${params}`);
                const data = await res.json();
                const grid = document.getElementById('galleryGrid');

                if (reset) grid.innerHTML = '';

                if (data.designs.length === 0 && currentPage === 1) {
                    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);grid-column:1/-1;padding:60px 0;">Пока нет дизайнов. Будьте первым!</p>';
                    document.getElementById('loadMoreBtn').style.display = 'none';
                    return;
                }

                data.designs.forEach(d => {
                    const card = document.createElement('div');
                    card.className = 'design-card';
                    card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s;';
                    card.innerHTML = `
                        <div style="height:200px;background:url('${d.image_url || '/static/images/modern.png'}') center/cover;"></div>
                        <div style="padding:16px;">
                            <h3 style="margin:0 0 4px;color:var(--text-main);font-size:1rem;">${d.title}</h3>
                            <p style="margin:0 0 8px;color:var(--text-muted);font-size:.8rem;">${d.style} • ${d.room}</p>
                            <div style="display:flex;gap:16px;font-size:.85rem;color:var(--text-secondary);">
                                <span><i class="fas fa-heart" style="color:var(--accent-red);"></i> ${d.likes_count || 0}</span>
                                <span><i class="fas fa-eye"></i> ${d.views_count || 0}</span>
                            </div>
                        </div>
                    `;
                    card.onclick = () => window.location.href = `/design/${d.id}`;
                    card.onmouseenter = () => card.style.transform = 'translateY(-4px)';
                    card.onmouseleave = () => card.style.transform = '';
                    grid.appendChild(card);
                });

                currentPage++;
                document.getElementById('loadMoreBtn').style.display = data.designs.length < 12 ? 'none' : '';
            } catch (e) {
                console.error('Load error:', e);
            }
            loading = false;
        }

        document.getElementById('filterStyle').onchange = () => loadDesigns(true);
        document.getElementById('filterRoom').onchange = () => loadDesigns(true);
        document.getElementById('filterSort').onchange = () => loadDesigns(true);
        document.getElementById('loadMoreBtn').onclick = () => loadDesigns();

        // Theme
        const tt = document.getElementById('themeToggle');
        const html = document.documentElement;
        html.setAttribute('data-theme', localStorage.getItem('interio_theme') || 'dark');
        tt.querySelector('i').className = html.getAttribute('data-theme') === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        tt.onclick = () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('interio_theme', next);
            tt.querySelector('i').className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        };

        loadDesigns();
    });
    </script>
</body>
</html>
