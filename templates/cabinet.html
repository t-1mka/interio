<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    .cabinet-page { padding-top: 100px; min-height: 100vh; }
    .cabinet-container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
    .cabinet-header { display: flex; gap: 24px; align-items: center; margin-bottom: 32px; }
    .cabinet-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--text-muted); overflow: hidden; position: relative; cursor: pointer; }
    .cabinet-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .cabinet-avatar .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .cabinet-avatar:hover .overlay { opacity: 1; }
    .cabinet-avatar .overlay i { color: white; font-size: 1.2rem; }
    .cabinet-info { flex: 1; }
    .cabinet-info h1 { font-size: 1.8rem; color: var(--text-main); margin-bottom: 4px; }
    .cabinet-info p { color: var(--text-muted); margin-bottom: 8px; }
    .cabinet-actions { display: flex; gap: 8px; margin-top: 8px; }
    .cabinet-actions button { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .cabinet-actions button:hover { border-color: var(--accent); color: var(--accent); }

    .settings-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .settings-card h2 { font-size: 1.1rem; color: var(--text-main); margin-bottom: 16px; }
    .settings-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
    .settings-row label { min-width: 100px; font-size: 0.85rem; color: var(--text-muted); }
    .settings-row input, .settings-row textarea { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-main); font-size: 0.85rem; outline: none; }
    .settings-row input:focus, .settings-row textarea:focus { border-color: var(--accent); }
    .settings-row button { padding: 10px 20px; border-radius: 10px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .settings-row button:hover { opacity: 0.9; }

    .submission-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .submission-card h3 { font-size: 1rem; color: var(--accent); margin-bottom: 8px; }
    .submission-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .submission-detail { font-size: 0.8rem; }
    .submission-detail .label { color: var(--text-muted); }
    .submission-detail .value { color: var(--text-main); font-weight: 600; }
    .submission-status { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 600; }
    .status-new { background: rgba(37,99,235,0.15); color: #2563eb; }
    .status-progress { background: rgba(243,156,18,0.15); color: #f39c12; }
    .status-done { background: rgba(34,197,94,0.15); color: #22c55e; }

    .no-subs { text-align: center; padding: 40px; color: var(--text-muted); }
    .no-subs i { font-size: 3rem; margin-bottom: 12px; display: block; }
    </style>
</head>
<body class="cabinet-page">
    <header class="header header-minimal">
        <div class="header-container">
            <a href="/" class="logo"><span>Interio</span></a>
            <div class="header-actions">
                <a href="/" class="btn-outline btn-small"><i class="fas fa-home"></i> На главную</a>
                <button class="btn-outline btn-small" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
        </div>
    </header>
    <div class="cabinet-container">
        <!-- Profile Header -->
        <div class="cabinet-header">
            <div class="cabinet-avatar" id="cabinetAvatar" onclick="document.getElementById('avatarInput').click()">
                <i class="fas fa-user"></i>
                <div class="overlay"><i class="fas fa-camera"></i></div>
            </div>
            <div class="cabinet-info">
                <h1 id="cabinetName">Пользователь</h1>
                <p id="cabinetPhone">+7 (___) ___-__-__</p>
                <p id="cabinetBio" style="font-size:0.85rem;color:var(--text-secondary);"></p>
                <div class="cabinet-actions">
                    <button onclick="document.getElementById('avatarInput').click()"><i class="fas fa-camera"></i> Сменить фото</button>
                    <button onclick="window.location.href='/quiz'"><i class="fas fa-plus"></i> Новая заявка</button>
                </div>
            </div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">

        <!-- Settings -->
        <div class="settings-card">
            <h2><i class="fas fa-cog"></i> Настройки профиля</h2>
            <div class="settings-row">
                <label>Никнейм</label>
                <input type="text" id="nicknameInput" placeholder="Ваш никнейм">
                <button onclick="updateNickname()">Сохранить</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
            <div class="settings-row">
                <label>О себе</label>
                <textarea id="bioInput" placeholder="Расскажите о себе..." rows="3"></textarea>
                <button onclick="updateBio()">Сохранить</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
            <div class="settings-row">
                <label>Телефон</label>
                <input type="tel" id="phoneInput" disabled>
            </div>
        </div>

        <!-- Submissions -->
        <div class="settings-card">
            <h2><i class="fas fa-clipboard-list"></i> История заявок (<span id="subCount">0</span>)</h2>
            <div id="submissionsList"></div>
        </div>
    </div>

    <script>
    var currentUser = null;

    // Load user data
    async function loadUser() {
        try {
            var r = await fetch('/api/auth/current-user');
            var d = await r.json();
            if (d.user) {
                currentUser = d.user;
                document.getElementById('cabinetName').textContent = d.user.nickname || 'Пользователь';
                document.getElementById('cabinetPhone').textContent = d.user.phone || '';
                document.getElementById('cabinetBio').textContent = d.user.bio || '';
                document.getElementById('nicknameInput').value = d.user.nickname || '';
                document.getElementById('bioInput').value = d.user.bio || '';
                document.getElementById('phoneInput').value = d.user.phone || '';
                if (d.user.avatar_url) {
                    document.getElementById('cabinetAvatar').innerHTML = '<img src="'+d.user.avatar_url+'" alt="Avatar"><div class="overlay"><i class="fas fa-camera"></i></div>';
                }
                loadSubmissions(d.user.phone);
            } else {
                window.location.href = '/';
            }
        } catch(e) { window.location.href = '/'; }
    }

    async function loadSubmissions(phone) {
        try {
            var r = await fetch('/api/profile/submissions/'+encodeURIComponent(phone));
            var d = await r.json();
            var subs = d.submissions || [];
            document.getElementById('subCount').textContent = subs.length;
            document.getElementById('submissionsList').innerHTML = subs.length === 0 ?
                '<div class="no-subs"><i class="fas fa-inbox"></i><p>У вас пока нет заявок</p><a href="/quiz" style="color:var(--accent);">Пройти квиз →</a></div>' :
                subs.map(function(s, i) {
                    var statusClass = 'status-new';
                    return '<div class="submission-card"><h3>Заявка #'+s.id+'</h3><div class="submission-details">'+
                        '<div class="submission-detail"><div class="label">Тип</div><div class="value">'+s.room_type+'</div></div>'+
                        '<div class="submission-detail"><div class="label">Стиль</div><div class="value">'+s.style+'</div></div>'+
                        '<div class="submission-detail"><div class="label">Площадь</div><div class="value">'+s.area+' м²</div></div>'+
                        '<div class="submission-detail"><div class="label">Бюджет</div><div class="value">'+s.budget+'</div></div>'+
                        '<div class="submission-detail"><div class="label">Дата</div><div class="value">'+new Date(s.created_at).toLocaleDateString('ru-RU')+'</div></div>'+
                        '<div class="submission-detail"><div class="label">Статус</div><span class="submission-status '+statusClass+'">Новая</span></div>'+
                        '</div></div>';
                }).join('');
        } catch(e) { document.getElementById('submissionsList').innerHTML = '<p style="color:var(--text-muted)">Ошибка загрузки</p>'; }
    }

    async function updateNickname() {
        var nick = document.getElementById('nicknameInput').value.trim();
        if (!nick) return;
        await fetch('/api/profile/update', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:nick,bio:currentUser.bio||'',phone:currentUser.phone})});
        document.getElementById('cabinetName').textContent = nick;
        currentUser.nickname = nick;
        showToast('Никнейм обновлён');
    }

    async function updateBio() {
        var bio = document.getElementById('bioInput').value.trim();
        await fetch('/api/profile/update', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:currentUser.nickname,bio:bio,phone:currentUser.phone})});
        document.getElementById('cabinetBio').textContent = bio;
        currentUser.bio = bio;
        showToast('Информация обновлена');
    }

    document.getElementById('avatarInput').addEventListener('change', async function(e) {
        var file = e.target.files[0]; if (!file) return;
        var fd = new FormData(); fd.append('file', file);
        var r = await fetch('/api/profile/avatar', {method:'POST', body:fd});
        var d = await r.json();
        if (d.success) {
            document.getElementById('cabinetAvatar').innerHTML = '<img src="'+d.url+'" alt="Avatar"><div class="overlay"><i class="fas fa-camera"></i></div>';
            showToast('Фото обновлено');
        }
    });

    function logout() { fetch('/api/auth/logout',{method:'POST'}); window.location.href = '/'; }
    function showToast(m) { var t = document.createElement('div'); t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--error);color:white;padding:12px 24px;border-radius:50px;z-index:9999;'; t.textContent = m; document.body.appendChild(t); setTimeout(function(){t.remove();},3000); }

    loadUser();
    </script>

    <!-- GigaChat Button -->
    <button id="gcFloatBtn" title="ИИ-советник" onclick="document.getElementById('gcModal').style.display='flex'" style="position:fixed;bottom:28px;right:28px;z-index:1000;width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,#2563eb,#e74c5e);color:white;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.5);display:flex;align-items:center;justify-content:center;">❓</button>
    <!-- GigaChat Modal -->
    <div id="gcModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h3 style="margin:0;font-size:1.1rem;color:var(--text-main);">❓ ИИ-советник</h3>
                <button onclick="document.getElementById('gcModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;">&times;</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
            <div id="gcMsgs" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;">
                <div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;line-height:1.5;">Привет! Спросите про стиль, бюджет, планировку, размеры помещений или материалы. 🏠</div>
            </div>
            <div style="display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border-color);">
                <input id="gcInput" type="text" placeholder="Спросите о дизайне..." style="flex:1;padding:12px 16px;border-radius:12px;background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-main);font-size:.9rem;outline:none;">
                <button onclick="sendGC()" style="padding:12px 20px;border-radius:12px;background:var(--accent);color:white;border:none;cursor:pointer;font-weight:600;">→</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('gcFloatBtn').addEventListener('click',function(){document.getElementById('gcModal').style.display='flex';});
    document.getElementById('gcModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
    async function sendGC(){var i=document.getElementById('gcInput'),b=document.getElementById('gcSendBtn'),m=document.getElementById('gcMsgs'),q=i.value.trim();if(!q)return;m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 4px 16px;background:var(--accent);color:white;align-self:flex-end;max-width:85%;font-size:.9rem;">'+esc(q)+'</div>';i.value='';b.disabled=true;m.scrollTop=m.scrollHeight;try{var r=await fetch('/api/support',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})}),d=await r.json();m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">'+esc(d.answer||'Ошибка')+'</div>';}catch(e){m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">⚠️ Ошибка</div>';}b.disabled=false;m.scrollTop=m.scrollHeight;}
    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    </script>

<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.12);pointer-events:none;z-index:1;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.12);text-decoration:none;">brainstorm</a></p>

    <script>
    // Voice input for all textareas and inputs
    (function(){
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        function addVoiceBtn(input) {
            if (input.dataset.voiceAdded) return;
            input.dataset.voiceAdded = 'true';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '&#127908;';
            btn.title = 'Голосовой ввод';
            btn.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.6;z-index:10;';
            btn.addEventListener('click', function() {
                var rec = new SR();
                rec.lang = 'ru-RU';
                rec.onresult = function(ev) { input.value = ev.results[0][0].transcript; };
                btn.style.opacity = '1';
                rec.start();
                setTimeout(function(){ btn.style.opacity = '0.6'; }, 3000);
            });
            var wrap = document.createElement('div');
            wrap.style.cssText = 'position:relative;display:inline-block;width:100%;';
            input.parentNode.insertBefore(wrap, input);
            wrap.appendChild(input);
            wrap.appendChild(btn);
        }
        document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        // Re-check on dynamic content
        var obs = new MutationObserver(function(){
            document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        });
        obs.observe(document.body, {childList:true, subtree:true});
    })();
    </script>

</body>
</html>
