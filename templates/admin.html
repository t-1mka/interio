<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/state-manager.js"></script>
    <script>
    try {
        window.stateManager.applyThemeFromStorage();
        window.stateManager.applyA11yAttrsFromStorage();
    } catch (e) {}
    </script>
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .admin-title {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .submissions-table {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .table-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border);
        }
        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            outline: none;
            width: 200px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: var(--bg-secondary);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-new {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        .status-contacted {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        .status-in_progress {
            background: rgba(236, 72, 153, 0.2);
            color: #ec4899;
        }
        .status-completed {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-small {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn-view {
            background: var(--accent);
            color: white;
        }
        .btn-view:hover {
            background: var(--accent-hover);
        }
        .status-select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.8rem;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .submission-details {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 8px;
        }
        .detail-label {
            font-weight: 600;
            min-width: 120px;
            color: var(--text-secondary);
        }
        .detail-value {
            color: var(--text-primary);
        }
        .back-btn {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title">Админ панель</h1>
            <p style="color: var(--text-secondary);">Управление заявками</p>
        </div>
        
        <div id="adminError" class="error" style="display: none;"></div>
        
        <div class="admin-stats" id="adminStats">
            <div class="stat-card">
                <div class="stat-number" id="totalSubmissions">-</div>
                <div class="stat-label">Всего заявок</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="newSubmissions">-</div>
                <div class="stat-label">Новых</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedSubmissions">-</div>
                <div class="stat-label">Обработано</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todaySubmissions">-</div>
                <div class="stat-label">За сегодня</div>
            </div>
        </div>
        
        <div class="submissions-table">
            <div class="table-header">
                <h2 style="color: var(--text-primary); margin: 0;">Заявки</h2>
                <div class="search-box">
                    <i class="fas fa-search" style="color: var(--text-secondary);"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по имени или телефону...">
                </div>
            </div>
            
            <div id="submissionsContent">
                <div class="loading">Загрузка заявок...</div>
            </div>
        </div>
    </div>
    
    <script src="/static/admin.js"></script>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>
</body>
</html>
