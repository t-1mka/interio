<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    .portfolio-page { padding-top: 100px; min-height: 100vh; }
    .portfolio-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .portfolio-header { text-align: center; margin-bottom: 32px; }
    .portfolio-header h1 { font-family: var(--font-display); font-size: 2rem; color: var(--text-main); }
    .portfolio-filters { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); background: rgba(37,99,235,0.1); color: var(--accent); }
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .portfolio-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.3s; cursor: pointer; }
    .portfolio-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 0 40px var(--accent-glow); }
    .portfolio-preview { width: 100%; height: 180px; background: linear-gradient(135deg, var(--accent), var(--accent-red)); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; }
    .portfolio-info { padding: 16px; }
    .portfolio-info h3 { font-size: 1rem; margin-bottom: 4px; color: var(--text-main); }
    .portfolio-info p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
    .portfolio-meta { display: flex; justify-content: space-between; align-items: center; }
    .portfolio-likes { display: flex; align-items: center; gap: 4px; color: var(--accent-red); font-size: 0.85rem; cursor: pointer; }
    .no-designs { text-align: center; padding: 60px 0; color: var(--text-muted); }
    </style>
</head>
<body class="portfolio-page">
    <header class="header header-minimal"><div class="header-container"><a href="/" class="logo"><span>Interio</span></a><div class="header-actions"><a href="/" class="btn-outline btn-small"><i class="fas fa-home"></i> На главную</a></div></div></header>
    <div class="portfolio-container">
        <div class="portfolio-header"><h1><i class="fas fa-images"></i> Портфолио</h1></div>
        <div class="portfolio-filters">
            <button class="filter-btn active" onclick="loadDesigns('')">Все</button>
            <button class="filter-btn" onclick="loadDesigns('Современный')">Современный</button>
            <button class="filter-btn" onclick="loadDesigns('Минимализм')">Минимализм</button>
            <button class="filter-btn" onclick="loadDesigns('Лофт')">Лофт</button>
            <button class="filter-btn" onclick="loadDesigns('Классика')">Классика</button>
        </div>
        <div class="portfolio-grid" id="portfolioGrid"></div>
    </div>
    <script>
    var icons = {'Современный':'🏢','Минимализм':'⬜','Скандинавский':'🌲','Лофт':'🧱','Классика':'🏛️','Неоклассика':'🏰'};
    function loadDesigns(style) {
        document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
        event.target.classList.add('active');
        var url = style ? '/api/portfolio?style='+encodeURIComponent(style) : '/api/portfolio';
        fetch(url).then(function(r){return r.json();}).then(function(data){
            var designs = data.designs || [];
            var grid = document.getElementById('portfolioGrid');
            if(designs.length === 0) { grid.innerHTML = '<div class="no-designs"><i class="fas fa-inbox" style="font-size:3rem;margin-bottom:16px;display:block;"></i>Пока нет дизайнов. Пройдите квиз!</div>'; return; }
            grid.innerHTML = designs.map(function(d){
                var ic = icons[d.style] || '🎨';
                return '<div class="portfolio-card" onclick="window.location.href=\'/design/'+d.id+'\'"><div class="portfolio-preview">'+ic+'</div><div class="portfolio-info"><h3>'+d.title+'</h3><p>'+d.style+' · '+d.budget+'</p><div class="portfolio-meta"><span style="font-size:0.75rem;color:var(--text-muted);">'+new Date(d.created_at).toLocaleDateString('ru-RU')+'</span><span class="portfolio-likes" onclick="event.stopPropagation();likeDesign('+d.id+',this)"><i class="fas fa-heart"></i> '+(d.likes_count||0)+'</span></div></div></div>';
            }).join('');
        });
    }
    function likeDesign(id, el) {
        fetch('/api/portfolio/'+id+'/like', {method:'POST'}).then(function(r){return r.json();}).then(function(d){
            el.innerHTML = '<i class="fas fa-heart"></i> '+d.likes_count;
        });
    }
    loadDesigns('');
    </script>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>

    <!-- GigaChat Button -->
    <button id="gcFloatBtn" title="ИИ-советник" onclick="document.getElementById('gcModal').style.display='flex'" style="position:fixed;bottom:28px;right:28px;z-index:1000;width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,#2563eb,#e74c5e);color:white;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.5);display:flex;align-items:center;justify-content:center;">❓</button>
    <!-- GigaChat Modal -->
    <div id="gcModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h3 style="margin:0;font-size:1.1rem;color:var(--text-main);">❓ ИИ-советник</h3>
                <button onclick="document.getElementById('gcModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;">&times;</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
            <div id="gcMsgs" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;">
                <div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;line-height:1.5;">Привет! Спросите про стиль, бюджет, планировку, размеры помещений или материалы. 🏠</div>
            </div>
            <div style="display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border-color);">
                <input id="gcInput" type="text" placeholder="Спросите о дизайне..." style="flex:1;padding:12px 16px;border-radius:12px;background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-main);font-size:.9rem;outline:none;">
                <button onclick="sendGC()" style="padding:12px 20px;border-radius:12px;background:var(--accent);color:white;border:none;cursor:pointer;font-weight:600;">→</button>
                <a href="/admin" class="btn-outline btn-small" style="margin-right:4px;"><i class="fas fa-cog"></i> Админ</a>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('gcFloatBtn').addEventListener('click',function(){document.getElementById('gcModal').style.display='flex';});
    document.getElementById('gcModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
    async function sendGC(){var i=document.getElementById('gcInput'),b=document.getElementById('gcSendBtn'),m=document.getElementById('gcMsgs'),q=i.value.trim();if(!q)return;m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 4px 16px;background:var(--accent);color:white;align-self:flex-end;max-width:85%;font-size:.9rem;">'+esc(q)+'</div>';i.value='';b.disabled=true;m.scrollTop=m.scrollHeight;try{var r=await fetch('/api/support',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})}),d=await r.json();m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">'+esc(d.answer||'Ошибка')+'</div>';}catch(e){m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">⚠️ Ошибка</div>';}b.disabled=false;m.scrollTop=m.scrollHeight;}
    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    </script>


    <script>
    // Voice input for all textareas and inputs
    (function(){
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        function addVoiceBtn(input) {
            if (input.dataset.voiceAdded) return;
            input.dataset.voiceAdded = 'true';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '&#127908;';
            btn.title = 'Голосовой ввод';
            btn.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.6;z-index:10;';
            btn.addEventListener('click', function() {
                var rec = new SR();
                rec.lang = 'ru-RU';
                rec.onresult = function(ev) { input.value = ev.results[0][0].transcript; };
                btn.style.opacity = '1';
                rec.start();
                setTimeout(function(){ btn.style.opacity = '0.6'; }, 3000);
            });
            var wrap = document.createElement('div');
            wrap.style.cssText = 'position:relative;display:inline-block;width:100%;';
            input.parentNode.insertBefore(wrap, input);
            wrap.appendChild(input);
            wrap.appendChild(btn);
        }
        document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        // Re-check on dynamic content
        var obs = new MutationObserver(function(){
            document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        });
        obs.observe(document.body, {childList:true, subtree:true});
    })();
    </script>

</body>
</html>
