<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/a11y-3d.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-image"></div><div class="bg-overlay"></div>
    <header class="header">
        <div class="header-container">
            <div class="logo"><a href="/">Interio</a></div>
            <nav class="nav-links"><a href="/" class="nav-link">Главная</a><a href="/quiz" class="nav-link">Квиз</a><a href="/portfolio" class="nav-link active">Портфолио</a></nav>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="a11y-toggle" id="a11yToggle"><i class="fas fa-eye"></i></button>
            </div>
        </div>
    </header>

    <section style="padding-top:100px;min-height:100vh;">
        <div class="container">
            <h1 style="font-family:var(--font-display);text-align:center;margin-bottom:32px;color:var(--text-main);">Портфолио / Вдохновение</h1>

            <!-- Filters -->
            <div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;">
                <select id="fStyle" style="padding:10px 16px;border-radius:50px;background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-main);">
                    <option value="">Все стили</option><option>Современный</option><option>Минимализм</option><option>Скандинавский</option><option>Классический</option><option>Лофт</option>
                </select>
                <select id="fBudget" style="padding:10px 16px;border-radius:50px;background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-main);">
                    <option value="">Любой бюджет</option><option>До 500 000 ₽</option><option>500 000 – 1 000 000 ₽</option><option>1 000 000 – 2 000 000 ₽</option><option>От 2 000 000 ₽</option>
                </select>
                <select id="fSort" style="padding:10px 16px;border-radius:50px;background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-main);">
                    <option value="newest">Новые</option><option value="popular">Популярные</option>
                </select>
                <input id="fSearch" type="text" placeholder="🔍 Поиск..." style="padding:10px 20px;border-radius:50px;background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-main);min-width:200px;">
            </div>

            <!-- Grid -->
            <div id="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
            <div style="text-align:center;margin-top:40px;">
                <button id="loadMore" class="btn-outline" style="padding:12px 32px;">Загрузить ещё</button>
            </div>
        </div>
    </section>

    <div id="a11yPanel" class="a11y-panel">
        <button class="a11y-close" onclick="document.getElementById('a11yPanel').classList.remove('show')">&times;</button>
        <h3><i class="fas fa-universal-access"></i> Доступность</h3>
        <label class="a11y-option"><input type="checkbox" id="a11y_contrast" onchange="toggleA11y(this,'contrast')"><span class="checkmark">✓</span><span>Высокий контраст</span></label>
        <label class="a11y-option"><input type="checkbox" id="a11y_buttons" onchange="toggleA11y(this,'large-buttons')"><span class="checkmark">✓</span><span>Крупные кнопки</span></label>
        <label class="a11y-option"><input type="checkbox" id="a11y_text" onchange="toggleA11y(this,'large-text')"><span class="checkmark">✓</span><span>Увеличенный текст</span></label>
    </div>

    <script src="/static/actions.js"></script>
    <script>
    // Theme
    const tt=document.getElementById('themeToggle'), html=document.documentElement;
    html.setAttribute('data-theme',localStorage.getItem('interio_theme')||'dark');
    tt.querySelector('i').className=html.getAttribute('data-theme")==='dark'?'fas fa-moon':'fas fa-sun';
    tt.onclick=()=>{const n=html.getAttribute('data-theme")==='dark'?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('interio_theme',n);tt.querySelector('i').className=n==='dark'?'fas fa-moon':'fas fa-sun';};
    document.getElementById('a11yToggle')?.addEventListener('click',()=>document.getElementById('a11yPanel').classList.toggle('show'));
    function toggleA11y(cb,f){if(cb.checked){html.setAttribute('data-'+f,'true');localStorage.setItem('interio_a11y_'+f,'true');}else{html.removeAttribute('data-'+f);localStorage.removeItem('interio_a11y_'+f);}}

    let page=1, loading=false;
    async function load(reset=false){
        if(loading) return; loading=true;
        if(reset){page=1;document.getElementById('grid').innerHTML='';}
        const style=document.getElementById('fStyle').value;
        const budget=document.getElementById('fBudget').value;
        const sort=document.getElementById('fSort').value;
        try{
            const p=new URLSearchParams({style,budget,sort,page,limit:12});
            const r=await fetch(`/api/portfolio?${p}`);const d=await r.json();
            const g=document.getElementById('grid');
            if(reset) g.innerHTML='';
            if(d.designs.length===0&&page===1){g.innerHTML='<p style="text-align:center;color:var(--text-muted);grid-column:1/-1;padding:60px;">Пока нет публикаций. Пройдите квиз и опубликуйте свой дизайн!</p>';document.getElementById('loadMore').style.display='none';return;}
            d.designs.forEach(des=>{
                const card=document.createElement('div');
                card.style.cssText='background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s;';
                card.innerHTML=`${des.preview_image?`<img src="${des.preview_image}" style="width:100%;height:200px;object-fit:cover;">`:`<div style="height:200px;background:linear-gradient(135deg,var(--accent),var(--accent-red));display:flex;align-items:center;justify-content:center;font-size:3rem;color:white;">🏠</div>`}
                <div style="padding:16px;"><h3 style="margin:0 0 4px;color:var(--text-main);font-size:1rem;">${des.title}</h3>
                <p style="margin:0 0 8px;color:var(--text-muted);font-size:.8rem;">${des.style||''} • ${des.budget||''}</p>
                <div style="display:flex;gap:16px;font-size:.85rem;color:var(--text-secondary);"><span><i class="fas fa-heart" style="color:var(--accent-red);"></i> ${des.likes_count||0}</span><span><i class="fas fa-eye"></i> ${des.views_count||0}</span></div></div>`;
                card.onclick=()=>window.location.href=`/design/${des.id}`;
                card.onmouseenter=()=>card.style.transform='translateY(-4px)';
                card.onmouseleave=()=>card.style.transform='';
                g.appendChild(card);
            });
            page++;document.getElementById('loadMore').style.display=d.designs.length<12?'none':'';
        }catch(e){console.error(e);}
        loading=false;
    }
    document.getElementById('fStyle').onchange=()=>load(true);
    document.getElementById('fBudget').onchange=()=>load(true);
    document.getElementById('fSort').onchange=()=>load(true);
    document.getElementById('loadMore').onclick=()=>load();
    load();
    </script>
</body>
</html>
