<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отследить заявку — Interio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    .track-page { padding-top: 100px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .track-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 40px; max-width: 500px; width: 90%; text-align: center; }
    .track-card h2 { font-family: var(--font-display); font-size: 1.8rem; color: var(--text-main); margin-bottom: 8px; }
    .track-card > p { color: var(--text-muted); margin-bottom: 24px; }
    .track-input-group { display: flex; gap: 10px; margin-bottom: 12px; }
    .track-input-group input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-main); font-size: 1rem; outline: none; }
    .track-input-group input:focus { border-color: var(--accent); }
    .track-input-group button { padding: 14px 24px; border-radius: 12px; background: var(--accent); color: white; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .track-input-group button:hover { transform: translateY(-2px); }
    .step { display: none; }
    .step.active { display: block; }
    .demo-code { margin-top: 12px; padding: 12px; background: var(--bg-primary); border-radius: 8px; font-family: monospace; font-size: 0.9rem; color: var(--accent); }
    .submissions-list { text-align: left; margin-top: 20px; }
    .submission-item { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .submission-item h4 { color: var(--accent); margin-bottom: 6px; }
    .submission-item p { font-size: 0.85rem; color: var(--text-secondary); margin: 2px 0; }
    .no-subs { text-align: center; padding: 30px; color: var(--text-muted); }
    .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 6px; }
    </style>
</head>
<body class="track-page">
    <div class="track-card">
        <h2><i class="fas fa-search"></i> Отследить заявку</h2>
        <p>Введите номер телефона для просмотра статуса</p>
        <div class="step active" id="stepPhone"><div class="track-input-group"><input type="tel" id="trackPhone" placeholder="+7 (999) 123-45-67" maxlength="18"><button onclick="requestCode()">Получить код</button></div><div class="error-msg" id="phoneError"></div></div>
        <div class="step" id="stepCode"><p style="color:var(--text-main);">Код отправлен на ваш телефон</p><div class="track-input-group"><input type="text" id="trackCode" placeholder="4-значный код" maxlength="4"><button onclick="verifyCode()">Проверить</button></div><div id="demoCode" class="demo-code"></div><div class="error-msg" id="codeError"></div></div>
        <div class="step" id="stepResult"><h3 style="margin-bottom:16px;color:var(--text-main);">Ваши заявки</h3><div class="submissions-list" id="submissionsList"></div><button onclick="resetTrack()" style="margin-top:16px;padding:10px 20px;border-radius:10px;background:transparent;border:1px solid var(--border-color);color:var(--text-main);cursor:pointer;"><i class="fas fa-redo"></i> Отследить другую</button></div>
    </div>
    <script>
    var currentPhone = '';
    document.getElementById('trackPhone').addEventListener('input', function() {
        var v = this.value.replace(/[^\d]/g,'');
        if(v.startsWith('8')) v='7'+v.substring(1);
        if(!v.startsWith('7')&&v.length>0) v='7'+v;
        var f='';
        if(v.length>0) f='+'+v.substring(0,1);
        if(v.length>1) f+=' ('+v.substring(1,4);
        if(v.length>4) f+=') '+v.substring(4,7);
        if(v.length>7) f+='-'+v.substring(7,9);
        if(v.length>9) f+='-'+v.substring(9,11);
        this.value=f;
    });
    async function requestCode() {
        var phone = document.getElementById('trackPhone').value.trim();
        if(phone.length<5) { document.getElementById('phoneError').textContent='Введите номер'; return; }
        document.getElementById('phoneError').textContent='';
        try {
            var r = await fetch('/api/track/request-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone})});
            var d = await r.json();
            if(d.success) { currentPhone = phone; document.getElementById('stepPhone').classList.remove('active'); document.getElementById('stepCode').classList.add('active'); if(d.demo_code) document.getElementById('demoCode').innerHTML='🔑 Демо-код: <b>'+d.demo_code+'</b>'; }
            else { document.getElementById('phoneError').textContent=d.detail||'Ошибка'; }
        } catch(e) { document.getElementById('phoneError').textContent='Ошибка соединения'; }
    }
    async function verifyCode() {
        var code = document.getElementById('trackCode').value.trim();
        if(code.length!==4) { document.getElementById('codeError').textContent='Введите 4-значный код'; return; }
        try {
            var r = await fetch('/api/track/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentPhone,code:code})});
            var d = await r.json();
            if(d.success && d.submissions.length>0) {
                document.getElementById('stepCode').classList.remove('active');
                document.getElementById('stepResult').classList.add('active');
                document.getElementById('submissionsList').innerHTML = d.submissions.map(function(s){return '<div class="submission-item"><h4>Заявка #'+s.id+'</h4><p>🏢 '+s.room_type+' · 🎨 '+s.style+'</p><p>💰 '+s.budget+' · 📐 '+s.area+' м²</p><p style="color:var(--text-muted);font-size:0.75rem;">'+new Date(s.created_at).toLocaleDateString('ru-RU')+'</p></div>';}).join('');
            } else { document.getElementById('codeError').textContent='Заявки не найдены'; }
        } catch(e) { document.getElementById('codeError').textContent='Ошибка'; }
    }
    function resetTrack() {
        document.getElementById('stepResult').classList.remove('active');
        document.getElementById('stepPhone').classList.add('active');
        document.getElementById('trackPhone').value='';
        document.getElementById('trackCode').value='';
        currentPhone='';
    }
    </script>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>
<p style="position:fixed;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.45rem;color:rgba(128,128,128,0.15);pointer-events:none;"><a href="https://brainstorm-c0ap.onrender.com/" style="color:rgba(128,128,128,0.15);text-decoration:none;">brainstorm</a></p>

    <!-- GigaChat Button -->
    <button id="gcFloatBtn" title="ИИ-советник" onclick="document.getElementById('gcModal').style.display='flex'" style="position:fixed;bottom:28px;right:28px;z-index:1000;width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,#2563eb,#e74c5e);color:white;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.5);display:flex;align-items:center;justify-content:center;">❓</button>
    <!-- GigaChat Modal -->
    <div id="gcModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;">
        <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h3 style="margin:0;font-size:1.1rem;color:var(--text-main);">❓ ИИ-советник</h3>
                <button onclick="document.getElementById('gcModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;">&times;</button>
            </div>
            <div id="gcMsgs" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;">
                <div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;line-height:1.5;">Привет! Спросите про стиль, бюджет, планировку, размеры помещений или материалы. 🏠</div>
            </div>
            <div style="display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border-color);">
                <input id="gcInput" type="text" placeholder="Спросите о дизайне..." style="flex:1;padding:12px 16px;border-radius:12px;background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-main);font-size:.9rem;outline:none;">
                <button onclick="sendGC()" style="padding:12px 20px;border-radius:12px;background:var(--accent);color:white;border:none;cursor:pointer;font-weight:600;">→</button>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('gcFloatBtn').addEventListener('click',function(){document.getElementById('gcModal').style.display='flex';});
    document.getElementById('gcModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
    async function sendGC(){var i=document.getElementById('gcInput'),b=document.getElementById('gcSendBtn'),m=document.getElementById('gcMsgs'),q=i.value.trim();if(!q)return;m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 4px 16px;background:var(--accent);color:white;align-self:flex-end;max-width:85%;font-size:.9rem;">'+esc(q)+'</div>';i.value='';b.disabled=true;m.scrollTop=m.scrollHeight;try{var r=await fetch('/api/support',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})}),d=await r.json();m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">'+esc(d.answer||'Ошибка')+'</div>';}catch(e){m.innerHTML+='<div style="padding:12px 16px;border-radius:16px 16px 16px 4px;background:var(--bg-card);color:var(--text-main);align-self:flex-start;max-width:85%;font-size:.9rem;">⚠️ Ошибка</div>';}b.disabled=false;m.scrollTop=m.scrollHeight;}
    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    </script>


    <script>
    // Voice input for all textareas and inputs
    (function(){
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        function addVoiceBtn(input) {
            if (input.dataset.voiceAdded) return;
            input.dataset.voiceAdded = 'true';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '&#127908;';
            btn.title = 'Голосовой ввод';
            btn.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.6;z-index:10;';
            btn.addEventListener('click', function() {
                var rec = new SR();
                rec.lang = 'ru-RU';
                rec.onresult = function(ev) { input.value = ev.results[0][0].transcript; };
                btn.style.opacity = '1';
                rec.start();
                setTimeout(function(){ btn.style.opacity = '0.6'; }, 3000);
            });
            var wrap = document.createElement('div');
            wrap.style.cssText = 'position:relative;display:inline-block;width:100%;';
            input.parentNode.insertBefore(wrap, input);
            wrap.appendChild(input);
            wrap.appendChild(btn);
        }
        document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        // Re-check on dynamic content
        var obs = new MutationObserver(function(){
            document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(addVoiceBtn);
        });
        obs.observe(document.body, {childList:true, subtree:true});
    })();
    </script>

</body>
</html>
