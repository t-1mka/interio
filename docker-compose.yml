services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: svoy
      POSTGRES_PASSWORD: svoy_pass
      POSTGRES_DB: svoy_style
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svoy -d svoy_style"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://svoy:svoy_pass@postgres:5432/svoy_style
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost:3002
      - CORS_ORIGINS=["http://localhost:3002","http://localhost:5173"]
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8001
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: on-failure

  bot:
    build: ./bot
    env_file: .env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
      - redis

volumes:
  postgres_data:
  redis_data:
  uploads:
