services:
  # Backend API
  - type: web
    name: svoy-style-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: svoy-style-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: svoy-style-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: svoy-style-frontend
          property: host
          scheme: https
      - key: GIGACHAT_AUTH_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false

  # Telegram Bot
  - type: web
    name: svoy-style-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: cd bot && pip install -r requirements.txt
    startCommand: cd bot && python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: svoy-style-frontend
          property: host
          scheme: https
      - key: API_URL
        fromService:
          type: web
          name: svoy-style-backend
          property: host
          scheme: https

databases:
  - name: svoy-style-db
    databaseName: svoy_style
    user: svoy
    ipAllowList: []
    plan: free
